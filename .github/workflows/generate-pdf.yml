name: Generate PDF

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pandoc and wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf texlive-xetex texlive-lang-chinese fonts-noto-cjk

      - name: Create pdf directory
        run: mkdir -p pdf

      - name: Generate PDFs
        run: |
          for week in {0..13}; do
            for day in {1..7}; do
              file="docs/week${week}/day${day}.md"
              if [ -f "$file" ]; then
                echo "📄 Generating ${file}..."
                pandoc "$file" \
                  -o "pdf/week${week}-day${day}.pdf" \
                  --pdf-engine=xelatex \
                  -V mainfont="Noto Sans CJK SC" \
                  -V geometry:margin=2cm \
                  -V fontsize=11pt \
                  --highlight-style=tango \
                  2>&1 || echo "⚠️ pandoc failed, trying wkhtmltopdf..."

                if [ ! -f "pdf/week${week}-day${day}.pdf" ]; then
                  pandoc "$file" -o "tmp.html" --standalone --metadata title="Week ${week} Day ${day}"
                  wkhtmltopdf --encoding utf-8 --enable-local-file-access "tmp.html" "pdf/week${week}-day${day}.pdf" 2>/dev/null || echo "⚠️ Also failed: ${file}"
                  rm -f "tmp.html"
                fi
              fi
            done
          done
          echo "📋 Generated PDFs:"
          ls -la pdf/*.pdf 2>/dev/null || echo "No PDFs generated"

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: pdf/*.pdf
          retention-days: 30

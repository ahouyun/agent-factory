<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Agent Factory - 从零到精通的 AI Agent 学习课程</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="融合 10 个优秀开源项目，20 周掌握 AI Agent 开发">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b883;
    }
    .sidebar {
      border-right: 1px solid #eee;
    }
    .markdown-section h1 {
      border-bottom: 2px solid #42b883;
      padding-bottom: 10px;
    }
    .markdown-section h2 {
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app">正在加载...</div>
  <script>
    window.$docsify = {
      name: '🤖 Agent Factory',
      repo: 'https://github.com/ahouyun/agent-factory',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      subMaxLevel: 3,
      search: {
        placeholder: '搜索',
        noData: '没有找到结果',
        depth: 3
      },
      auto2top: true,
      executeScript: true,
      tabs: {
        persist: true,
        sync: true,
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        successText: '已复制'
      },
      emoji: {
        toplevel: ['😊', '🤖', '🚀'],
        outline: ['📑', '📋', '📝']
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-yaml.min.js"></script>
